<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAM - São Paulo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header-top">
        <div class="logo-area">
            <img src="img/logo.png" alt="Logo MAM" class="logo">
        </div>
        
        <div class="header-menu">
            <div class="menu-item">
                <p>menu</p>
                <img src="img/menu.png" alt="Menu" class="icone-menu">
            </div>
            <div class="menu-item">
                <p>apoie o museu</p>
            </div>
            <div class="menu-item">
                <p>pt</p>
                <div class="menu-lupa">
                    <img src="img/lupa.png" alt="Buscar" class="icone-lupa">
                </div>
            </div>
        </div>
    </header>

    <main class="info-bar">
        <div class="nome-museu">
            museu de arte moderna de são paulo
        </div>

        <div class="aviso">
            A sede do MAM está <a href="#">temporariamente fechada</a> para reforma da marquise do Parque Ibirapuera, mas nossa programação continua ativa. <a href="#">Clique aqui</a> e acompanhe as ações do MAM em Movimento.
        </div>
    </main>

    <div class="banner-principal">
        <img src="img/mam-gif.gif" alt="Banner MAM">
    </div>

    <div class="whatsapp">
        <img src="img/zap.png" alt="WhatsApp">
    </div>

</body>
</html>
